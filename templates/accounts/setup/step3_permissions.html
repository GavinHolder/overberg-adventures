{% load static %}
<form
  method="post"
  action="{% url 'accounts:profile_setup_step' step=3 %}"
  hx-post="{% url 'accounts:profile_setup_step' step=3 %}"
  hx-target="#step-content"
  hx-swap="innerHTML"
  x-data="{
    locationEnabled: {{ profile.location_enabled|yesno:'true,false' }},
    notificationsEnabled: {{ profile.notifications_enabled|yesno:'true,false' }},
  }"
>
  {% csrf_token %}

  <!-- Icon + heading -->
  <div class="d-flex align-items-center gap-3 mb-2">
    <div style="width: 48px; height: 48px; border-radius: 14px; background: rgba(13,148,136,0.1); display: flex; align-items: center; justify-content: center;">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="var(--color-secondary)">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
      </svg>
    </div>
    <div>
      <h2 class="fw-bold mb-0" style="font-size: 19px;">Enable App Permissions</h2>
    </div>
  </div>
  <p class="mb-4" style="color: var(--color-text-muted); font-size: 13px;">
    These permissions improve your experience on the adventure.
  </p>

  <!-- Location card -->
  <div class="card-oa mb-3">
    <div class="d-flex align-items-start gap-3">
      <div style="width: 44px; height: 44px; border-radius: 12px; background: rgba(249,115,22,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="var(--color-primary)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
        </svg>
      </div>
      <div class="flex-grow-1">
        <h3 class="fw-bold mb-1" style="font-size: 15px;">Location Access</h3>
        <p style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 12px;">
          Required for interactive trail maps and emergency SOS.
        </p>
        <div class="d-flex align-items-center gap-2">
          <button
            type="button"
            class="btn-oa-outline"
            style="width: auto; padding: 8px 16px; font-size: 13px;"
            @click="locationEnabled = true"
            :style="locationEnabled ? 'background: rgba(249,115,22,0.08);' : ''"
          >
            {% if profile.location_enabled %}Location Enabled{% else %}Enable Location{% endif %}
          </button>
          <span x-show="locationEnabled" style="color: #22C55E; font-size: 13px; font-weight: 600;">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="display:inline; vertical-align: middle;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
            Enabled
          </span>
        </div>
      </div>
    </div>
    <input type="checkbox" name="location_enabled" x-bind:checked="locationEnabled" style="display:none;" value="on">
  </div>

  <!-- Notifications card -->
  <div class="card-oa mb-4">
    <div class="d-flex align-items-start gap-3">
      <div style="width: 44px; height: 44px; border-radius: 12px; background: rgba(249,115,22,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="var(--color-primary)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
        </svg>
      </div>
      <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <h3 class="fw-bold mb-0" style="font-size: 15px;">Notifications</h3>
          <span
            x-show="notificationsEnabled"
            style="background: #DCFCE7; color: #15803D; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;"
          >ON</span>
          <span
            x-show="!notificationsEnabled"
            style="background: #F3F4F6; color: #6B7280; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px;"
          >OFF</span>
        </div>
        <p style="font-size: 13px; color: var(--color-text-muted); margin-bottom: 12px;">
          Receive itinerary updates and guide messages.
        </p>
        <button
          type="button"
          class="btn-oa-outline"
          style="width: auto; padding: 8px 16px; font-size: 13px;"
          @click="notificationsEnabled = !notificationsEnabled"
        >
          <span x-text="notificationsEnabled ? 'Disable' : 'Enable Notifications'"></span>
        </button>
      </div>
    </div>
    <input type="checkbox" name="notifications_enabled" x-bind:checked="notificationsEnabled" style="display:none;" value="on">
  </div>

  <!-- Actions -->
  <div class="d-flex gap-3">
    <a href="{% url 'accounts:profile_setup_step' step=2 %}" class="btn-oa-secondary text-center text-decoration-none" style="flex:1; padding: 14px 24px; border-radius: 14px;">
      &lsaquo; Back
    </a>
    <button type="submit" class="btn-oa-primary" style="flex:2;">Next &rsaquo;</button>
  </div>

</form>
