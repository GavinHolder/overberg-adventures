{% load static %}
<form
  method="post"
  action="{% url 'accounts:profile_setup_step' step=2 %}"
  hx-post="{% url 'accounts:profile_setup_step' step=2 %}"
  hx-target="#step-content"
  hx-swap="innerHTML"
  x-data="{
    fitness: {{ profile.fitness_level|default:3 }},
    medical: '{{ profile.medical_conditions|escapejs }}',
    dietary: '{{ profile.dietary_requirements|escapejs }}',
  }"
>
  {% csrf_token %}

  <!-- Icon + heading -->
  <div class="d-flex align-items-center gap-3 mb-2">
    <div style="width: 48px; height: 48px; border-radius: 14px; background: rgba(239,68,68,0.1); display: flex; align-items: center; justify-content: center;">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="var(--color-danger)">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
      </svg>
    </div>
    <div>
      <h2 class="fw-bold mb-0" style="font-size: 19px;">Health Information</h2>
    </div>
  </div>
  <p class="mb-4" style="color: var(--color-text-muted); font-size: 13px; font-style: italic;">
    This information helps your guide ensure your safety and comfort.
  </p>

  <!-- Fitness level -->
  <div class="mb-4">
    <label class="label-xs">FITNESS LEVEL</label>
    <div class="d-flex gap-2 mt-2 align-items-center">
      <span style="font-size: 12px; color: var(--color-text-muted);">Unfit</span>
      {% for i in "12345" %}
      <button
        type="button"
        class="fitness-btn"
        :class="{ 'selected': fitness === {{ forloop.counter }} }"
        @click="fitness = {{ forloop.counter }}"
      >{{ forloop.counter }}</button>
      {% endfor %}
      <span style="font-size: 12px; color: var(--color-text-muted);">Very Fit</span>
    </div>
    <input type="hidden" name="fitness_level" :value="fitness">
  </div>

  <!-- Medical conditions -->
  <div class="mb-3">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <label class="label-xs mb-0">MEDICAL CONDITIONS</label>
      <button
        type="button"
        class="btn btn-link p-0"
        style="font-size: 12px; color: var(--color-primary); text-decoration: none;"
        @click="medical = 'None'"
      >Set to "None"</button>
    </div>
    <textarea
      name="medical_conditions"
      class="form-control-oa"
      rows="3"
      placeholder="e.g. asthma, diabetes, allergies..."
      x-model="medical"
    ></textarea>
  </div>

  <!-- Dietary requirements -->
  <div class="mb-4">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <label class="label-xs mb-0">DIETARY REQUIREMENTS</label>
      <button
        type="button"
        class="btn btn-link p-0"
        style="font-size: 12px; color: var(--color-primary); text-decoration: none;"
        @click="dietary = 'None'"
      >Set to "None"</button>
    </div>
    <textarea
      name="dietary_requirements"
      class="form-control-oa"
      rows="3"
      placeholder="e.g. vegetarian, nut allergy, halal..."
      x-model="dietary"
    ></textarea>
  </div>

  <!-- Actions -->
  <div class="d-flex gap-3">
    <a href="{% url 'accounts:profile_setup_step' step=1 %}" class="btn-oa-secondary text-center text-decoration-none" style="flex:1; padding: 14px 24px; border-radius: 14px;">
      &lsaquo; Back
    </a>
    <button type="submit" class="btn-oa-primary" style="flex:2;">Next &rsaquo;</button>
  </div>

</form>
