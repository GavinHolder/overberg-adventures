{% load static %}
<form
  method="post"
  action="{% url 'accounts:profile_setup_step' step=1 %}"
  hx-post="{% url 'accounts:profile_setup_step' step=1 %}"
  hx-target="#step-content"
  hx-swap="innerHTML"
>
  {% csrf_token %}

  <!-- Icon + heading -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <div style="width: 48px; height: 48px; border-radius: 14px; background: rgba(249,115,22,0.1); display: flex; align-items: center; justify-content: center;">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="var(--color-primary)">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
      </svg>
    </div>
    <div>
      <h2 class="fw-bold mb-0" style="font-size: 19px;">Personal Details</h2>
      <p class="mb-0" style="color: var(--color-text-muted); font-size: 13px;">Tell us a bit about yourself</p>
    </div>
  </div>

  <!-- Name row -->
  <div class="row g-3 mb-3">
    <div class="col-6">
      <label class="label-xs" for="first_name">First Name</label>
      <input
        type="text"
        id="first_name"
        name="first_name"
        class="form-control-oa"
        value="{{ profile.first_name }}"
        placeholder="John"
        required
      >
    </div>
    <div class="col-6">
      <label class="label-xs" for="last_name">Last Name</label>
      <input
        type="text"
        id="last_name"
        name="last_name"
        class="form-control-oa"
        value="{{ profile.last_name }}"
        placeholder="Doe"
      >
    </div>
  </div>

  <!-- Phone -->
  <div class="mb-3">
    <label class="label-xs" for="phone_whatsapp">Phone (WhatsApp)</label>
    <div class="position-relative">
      <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-text-muted);">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
        </svg>
      </span>
      <input
        type="tel"
        id="phone_whatsapp"
        name="phone_whatsapp"
        class="form-control-oa"
        style="padding-left: 40px;"
        value="{{ profile.phone_whatsapp }}"
        placeholder="+27 82 123 4567"
      >
    </div>
  </div>

  <!-- Date of birth -->
  <div class="mb-3">
    <label class="label-xs" for="date_of_birth">Date of Birth</label>
    <input
      type="date"
      id="date_of_birth"
      name="date_of_birth"
      class="form-control-oa"
      value="{% if profile.date_of_birth %}{{ profile.date_of_birth|date:'Y-m-d' }}{% endif %}"
    >
  </div>

  <!-- Email (read-only) -->
  <div class="mb-4">
    <label class="label-xs" for="email_display">Email</label>
    <input
      type="email"
      id="email_display"
      class="form-control-oa"
      value="{{ user.email }}"
      readonly
      style="background: #F5F5F5; color: var(--color-text-muted);"
    >
    <p class="mt-1" style="font-size: 12px; color: var(--color-text-muted);">
      Wrong account?
      <a href="{% url 'accounts:logout' %}" style="color: var(--color-primary); text-decoration: none;">
        Sign out and try again
      </a>
    </p>
  </div>

  <!-- Actions -->
  <div class="d-flex gap-3">
    <button type="submit" class="btn-oa-primary">Next &rsaquo;</button>
  </div>

</form>
