{% load static %}
<form
  method="post"
  action="{% url 'accounts:profile_setup_step' step=4 %}"
  hx-post="{% url 'accounts:profile_setup_step' step=4 %}"
  hx-target="#step-content"
  hx-swap="innerHTML"
>
  {% csrf_token %}

  <!-- Icon + heading -->
  <div class="d-flex align-items-center gap-3 mb-2">
    <div style="width: 48px; height: 48px; border-radius: 14px; background: rgba(234,179,8,0.12); display: flex; align-items: center; justify-content: center;">
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="#CA8A04">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
      </svg>
    </div>
    <div>
      <h2 class="fw-bold mb-0" style="font-size: 19px;">Personal Notes</h2>
    </div>
  </div>
  <p class="mb-4" style="color: var(--color-text-muted); font-size: 13px; font-style: italic;">
    Optional &mdash; visible to your guide only
  </p>

  <!-- Notes textarea -->
  <div class="mb-4">
    <label class="label-xs" for="personal_notes">NOTES FOR YOUR GUIDE</label>
    <textarea
      id="personal_notes"
      name="personal_notes"
      class="form-control-oa"
      rows="8"
      placeholder="e.g. I prefer a steady pace on uphill sections&#10;I have a fear of heights&#10;Please let me know before any water crossings&#10;I'm travelling with my 8-year-old"
      style="resize: none;"
    >{{ profile.personal_notes }}</textarea>
  </div>

  <!-- Actions -->
  <div class="d-flex gap-3">
    <a href="{% url 'accounts:profile_setup_step' step=3 %}" class="btn-oa-secondary text-center text-decoration-none" style="flex:1; padding: 14px 24px; border-radius: 14px;">
      &lsaquo; Back
    </a>
    <button type="submit" class="btn-oa-primary" style="flex:2;">Next &rsaquo;</button>
  </div>

</form>
