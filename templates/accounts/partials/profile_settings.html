<div class="card-oa mb-3">
  <div class="d-flex align-items-center mb-3">
    <i class="bi bi-gear text-muted me-2"></i>
    <span class="fw-bold">App Settings</span>
  </div>

  <!-- Location Services toggle -->
  <div class="d-flex justify-content-between align-items-center py-2"
       id="toggle-location"
       hx-post="{% url 'accounts:settings_toggle' %}"
       hx-trigger="change from:#location-switch"
       hx-vals='{"field": "location_enabled"}'
       hx-swap="none">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-geo-alt text-primary"></i>
      <span class="fw-semibold small">Location Services</span>
    </div>
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" role="switch" id="location-switch"
             {% if profile.location_enabled %}checked{% endif %}>
    </div>
  </div>

  <div class="my-2 border-bottom"></div>

  <!-- Notifications toggle -->
  <div class="d-flex justify-content-between align-items-center py-2"
       id="toggle-notifications"
       hx-post="{% url 'accounts:settings_toggle' %}"
       hx-trigger="change from:#notifications-switch"
       hx-vals='{"field": "notifications_enabled"}'
       hx-swap="none">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-bell text-primary"></i>
      <span class="fw-semibold small">Notifications</span>
    </div>
    <div class="form-check form-switch mb-0">
      <input class="form-check-input" type="checkbox" role="switch" id="notifications-switch"
             {% if profile.notifications_enabled %}checked{% endif %}>
    </div>
  </div>
</div>
