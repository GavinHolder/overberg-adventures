<div class="card-oa mb-3">
  <h2 class="fw-bold mb-3" style="font-size:1.05rem">
    <i class="bi bi-telephone-fill text-danger me-2"></i>Emergency Numbers
  </h2>
  <div class="sos-numbers-grid">
    <a href="tel:10111" class="sos-number-card" onclick="return confirm('Call SAPS (10111)?')">
      <span class="sos-number-label">SAPS</span>
      <span class="sos-number">10111</span>
    </a>
    <a href="tel:10177" class="sos-number-card sos-ambulance" onclick="return confirm('Call Ambulance (10177)?')">
      <span class="sos-number-label">Ambulance</span>
      <span class="sos-number">10177</span>
    </a>
    <a href="tel:+27219381300" class="sos-number-card sos-nsri" onclick="return confirm('Call NSRI Sea Rescue?')">
      <span class="sos-number-label">NSRI</span>
      <span class="sos-number">021 938 1300</span>
    </a>
    <a href="tel:112" class="sos-number-card sos-mountain" onclick="return confirm('Call Mountain Rescue (112)?')">
      <span class="sos-number-label">Mountain Rescue</span>
      <span class="sos-number">112</span>
    </a>
    <a href="tel:10111" class="sos-number-card sos-fire" onclick="return confirm('Call Fire Department?')">
      <span class="sos-number-label">Fire</span>
      <span class="sos-number">10111</span>
    </a>
    <a href="tel:112" class="sos-number-card sos-general" onclick="return confirm('Call General Emergency (112)?')">
      <span class="sos-number-label">General</span>
      <span class="sos-number">112</span>
    </a>
  </div>
</div>
