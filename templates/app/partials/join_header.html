<div class="join-header-card mb-4">
  <div class="d-flex align-items-center gap-2 mb-2">
    <span class="tour-code-badge-lg">{{ tour.tour_code|upper }}</span>
    <span class="text-white-50 small">{{ tour.get_status_display }}</span>
  </div>
  <h1 class="fw-bold text-white mb-2 fs-4">{{ tour.name }}</h1>
  <p class="mb-1 small" style="color:rgba(255,255,255,0.85)">
    <i class="bi bi-calendar3 me-1"></i>{{ tour.start_datetime|date:"j M Y, H:i" }}
  </p>
  <p class="mb-0 small" style="color:rgba(255,255,255,0.85)">
    <i class="bi bi-geo-alt me-1"></i>{{ tour.location_name }}
  </p>
</div>
