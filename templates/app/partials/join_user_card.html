<div class="card-oa mb-4">
  <div class="d-flex align-items-center gap-3 mb-3">
    <div class="guest-avatar-lg d-flex align-items-center justify-content-center fw-bold text-white"
         style="font-size:1.3rem; background: linear-gradient(135deg,#7C3AED,#5B21B6);">
      {% if profile.initials %}{{ profile.initials|upper }}{% else %}{{ profile.first_name|first|upper }}{% endif %}
    </div>
    <div>
      <div class="fw-bold fs-6">{{ profile.full_name }}</div>
      <div class="text-muted small">{{ request.user.email }}</div>
    </div>
  </div>
  <p class="text-muted small mb-0">
    <i class="bi bi-info-circle me-1"></i>
    Your profile information will be shared with the guide.
  </p>
</div>
