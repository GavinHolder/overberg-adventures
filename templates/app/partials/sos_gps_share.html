<div class="card-oa mb-3" x-data="gpsShare()">
  <h2 class="fw-bold mb-2" style="font-size:1.05rem">
    <i class="bi bi-geo-alt-fill text-primary me-2"></i>Share My Location
  </h2>
  <p class="text-muted small mb-3">Get a shareable Google Maps link with your exact GPS coordinates.</p>
  <button x-on:click="share()" class="btn-oa-outline w-100" x-bind:disabled="loading">
    <i class="bi bi-share me-2"></i>
    <span x-text="loading ? 'Getting location...' : 'Generate GPS Link'"></span>
  </button>
  <div x-show="link" x-cloak class="mt-3">
    <p class="text-muted small mb-1">Your location:</p>
    <a x-bind:href="link" target="_blank" rel="noopener"
       class="d-block text-primary small text-break" x-text="link"></a>
  </div>
  <p x-show="error" x-cloak class="text-danger small mt-2 mb-0" x-text="error"></p>
</div>

<script>
function gpsShare() {
  return {
    loading: false, error: '', link: '',
    share() {
      this.error = ''; this.link = ''; this.loading = true;
      navigator.geolocation.getCurrentPosition(
        pos => {
          this.loading = false;
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          this.link = 'https://maps.google.com/?q=' + lat + ',' + lng;
        },
        () => {
          this.loading = false;
          this.error = 'Could not get location. Check browser permissions.';
        },
        { timeout: 10000, maximumAge: 0 }
      );
    }
  };
}
</script>
