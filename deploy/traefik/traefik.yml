api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
    # Uncomment when domain + Let's Encrypt is configured:
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
  websecure:
    address: ":443"
    # Uncomment when Let's Encrypt is configured:
    # http:
    #   tls:
    #     certResolver: letsencrypt

providers:
  docker:
    exposedByDefault: false
    network: traefik_net

log:
  level: INFO

