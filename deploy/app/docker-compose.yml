# App stack - build from local repo clone on the VM
# Deploy manually:
#   cd ~/overberg-adventures
#   cp deploy/app/.env .env   (first time only)
#   docker compose -f deploy/app/docker-compose.yml up --build -d
services:
  web:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: overberg-adventures:latest
    container_name: oa_web
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DEV_MODE: ${DEV_MODE:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SITE_ID: ${SITE_ID:-1}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@overstrandadventures.co.za}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_SECRET: ${GOOGLE_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_ADMIN_EMAIL: ${VAPID_ADMIN_EMAIL:-admin@overstrandadventures.co.za}
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-manual}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oa.rule=PathPrefix(`/`)"
      - "traefik.http.services.oa.loadbalancer.server.port=8000"
    networks:
      - traefik_net

  db:
    image: postgres:16-alpine
    container_name: oa_db
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traefik_net

  celery:
    image: overberg-adventures:latest
    container_name: oa_celery
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DEV_MODE: ${DEV_MODE:-False}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@overstrandadventures.co.za}
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-manual}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    command: celery -A overberg_adventures worker -l info -c 4
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik_net

  celery-beat:
    image: overberg-adventures:latest
    container_name: oa_celery_beat
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DEV_MODE: ${DEV_MODE:-False}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@overstrandadventures.co.za}
      PAYMENT_GATEWAY: ${PAYMENT_GATEWAY:-manual}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    command: celery -A overberg_adventures beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      db:
        condition: service_healthy
    networks:
      - traefik_net

volumes:
  pg_data:

networks:
  traefik_net:
    external: true
